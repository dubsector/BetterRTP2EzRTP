name: EzRTP Compatibility Check

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:      # manual trigger from Actions tab

permissions:
  contents: write
  issues: write

env:
  EZRTP_REPO: ${{ vars.EZRTP_GITHUB_REPO }}

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Fetch latest EzRTP release
      - name: Get latest EzRTP release
        id: ezrtp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$EZRTP_REPO" ]; then
            echo "::error::EZRTP_GITHUB_REPO variable not set. Add it under Settings > Variables > Actions."
            exit 1
          fi
          release=$(gh api repos/$EZRTP_REPO/releases/latest)
          tag=$(echo "$release" | jq -r '.tag_name')
          jar_url=$(echo "$release" | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -1)
          echo "tag=$tag"       >> "$GITHUB_OUTPUT"
          echo "jar_url=$jar_url" >> "$GITHUB_OUTPUT"
          echo "Latest EzRTP: $tag  jar: $jar_url"

      # 2. Skip if already processed
      - name: Check stored version
        id: version_check
        run: |
          stored=$(cat .github/ezrtp-version.txt | tr -d '[:space:]')
          latest="${{ steps.ezrtp.outputs.tag }}"
          if [ "$stored" = "$latest" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date ($latest) — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version: $stored -> $latest"
          fi

      # 3. Download jar and extract default configs
      - name: Extract EzRTP configs
        if: steps.version_check.outputs.skip == 'false'
        run: |
          jar_url="${{ steps.ezrtp.outputs.jar_url }}"
          if [ -z "$jar_url" ]; then
            echo "::error::No .jar asset found in latest EzRTP release."
            exit 1
          fi
          mkdir -p /tmp/ezrtp-extract
          curl -sSL -o /tmp/ezrtp.jar "$jar_url"
          cd /tmp/ezrtp-extract
          unzip -o /tmp/ezrtp.jar '*.yml' '*.yaml' 2>/dev/null || true
          echo "Extracted:"; find /tmp/ezrtp-extract -type f | sort

      # 4. Diff against baseline
      - name: Diff configs
        id: diff
        if: steps.version_check.outputs.skip == 'false'
        run: |
          diff_output=$(diff -ruN \
            --exclude="plugin.yml" \
            --exclude="README.md" \
            .github/ezrtp-baseline /tmp/ezrtp-extract 2>&1 || true)
          if [ -z "$diff_output" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            printf '%s' "$diff_output" > /tmp/config-diff.txt
            echo "Config changed — diff saved."
          fi

      # 5a. No changes: update baseline, build, auto-release
      - name: Update baseline and version
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        run: |
          cp -r /tmp/ezrtp-extract/. .github/ezrtp-baseline/
          rm -f .github/ezrtp-baseline/plugin.yml
          echo "${{ steps.ezrtp.outputs.tag }}" > .github/ezrtp-version.txt

      - name: Set up JDK 21
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        run: mvn -B package --no-transfer-progress

      - name: Commit baseline
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ezrtp-baseline/ .github/ezrtp-version.txt
          git commit -m "chore: update EzRTP baseline to ${{ steps.ezrtp.outputs.tag }}"
          git push

      - name: Create release
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="auto-${{ steps.ezrtp.outputs.tag }}"
          ezrtp_tag="${{ steps.ezrtp.outputs.tag }}"
          notes=$(cat <<EOF
          Automatically verified compatible with EzRTP ${ezrtp_tag}.

          No changes to EzRTP config format were detected. This build is functionally identical to the previous release.

          EzRTP release: https://github.com/${EZRTP_REPO}/releases/tag/${ezrtp_tag}
          EOF
          )
          gh release create "$tag" \
            target/BetterRTP2EzRTP-*.jar \
            --title "Compatible with EzRTP ${ezrtp_tag}" \
            --notes "$notes" \
            --latest

      # 5b. Config changed: open issue, snapshot baseline
      - name: Open compatibility issue
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ezrtp_tag="${{ steps.ezrtp.outputs.tag }}"
          diff_body=$(cat /tmp/config-diff.txt)
          body=$(cat <<EOF
          ## EzRTP ${ezrtp_tag} released with config changes

          The weekly compatibility check found differences in EzRTP's default config files.

          **Action required:** Review the diff, update ConfigMapper.java for any new/changed/removed fields, then push. The next scheduled run will auto-release once resolved.

          \`\`\`diff
          ${diff_body}
          \`\`\`

          **Steps to resolve:**
          1. Review the diff above
          2. Update ConfigMapper.java and MigrationReport entries as needed
          3. Run: echo '${ezrtp_tag}' > .github/ezrtp-version.txt
          4. Update .github/ezrtp-baseline/ with the new configs
          5. Commit and push, then create a release manually

          _Opened automatically by the EzRTP Compatibility Check workflow._
          EOF
          )
          gh issue create \
            --title "EzRTP ${ezrtp_tag}: config changes need review" \
            --label "compatibility" \
            --body "$body"

      - name: Snapshot baseline for review
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'true'
        run: |
          cp -r /tmp/ezrtp-extract/. .github/ezrtp-baseline/
          rm -f .github/ezrtp-baseline/plugin.yml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ezrtp-baseline/
          git commit -m "chore: snapshot EzRTP ${{ steps.ezrtp.outputs.tag }} baseline (review required)" || true
          git push || true
