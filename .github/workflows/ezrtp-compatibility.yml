name: EzRTP Compatibility Check

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:      # manual trigger from Actions tab

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      # 1. Fetch latest EzRTP release
      - name: Get latest EzRTP release
        id: ezrtp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EZRTP_REPO: ${{ vars.EZRTP_GITHUB_REPO }}
        run: |
          if [ -z "${EZRTP_REPO}" ]; then
            echo "::error::EZRTP_GITHUB_REPO variable not set. Add it under Settings > Variables > Actions."
            exit 1
          fi
          release=$(gh api repos/"${EZRTP_REPO}"/releases/latest)
          tag=$(echo "$release" | jq -r '.tag_name')
          jar_url=$(echo "$release" | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -1)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "jar_url=${jar_url}" >> "$GITHUB_OUTPUT"
          echo "Latest EzRTP: ${tag}"

      # 2. Skip if already processed
      - name: Check stored version
        id: version_check
        run: |
          stored=$(cat .github/ezrtp-version.txt | tr -d '[:space:]')
          latest="${{ steps.ezrtp.outputs.tag }}"
          if [ "$stored" = "$latest" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up-to-date (${latest}) — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version detected: ${stored} -> ${latest}"
          fi

      # 3. Download jar and extract default configs
      - name: Extract EzRTP configs
        if: steps.version_check.outputs.skip == 'false'
        env:
          JAR_URL: ${{ steps.ezrtp.outputs.jar_url }}
        run: |
          if [ -z "${JAR_URL}" ]; then
            echo "::error::No .jar asset found in latest EzRTP release."
            exit 1
          fi
          mkdir -p /tmp/ezrtp-extract
          curl -sSL -o /tmp/ezrtp.jar "${JAR_URL}"
          cd /tmp/ezrtp-extract
          unzip -o /tmp/ezrtp.jar '*.yml' '*.yaml' 2>/dev/null || true
          echo "Extracted:"; find /tmp/ezrtp-extract -type f | sort

      # 4. Diff against baseline
      - name: Diff configs
        id: diff
        if: steps.version_check.outputs.skip == 'false'
        run: |
          diff_output=$(diff -ruN \
            --exclude="plugin.yml" \
            --exclude="README.md" \
            .github/ezrtp-baseline /tmp/ezrtp-extract 2>&1 || true)
          if [ -z "$diff_output" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            printf '%s' "$diff_output" > /tmp/config-diff.txt
            echo "Config changes detected."
          fi

      # 5a. No changes — update tracked version, no release
      - name: Update tracked version
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'false'
        env:
          EZRTP_TAG: ${{ steps.ezrtp.outputs.tag }}
        run: |
          echo "${EZRTP_TAG}" > .github/ezrtp-version.txt
          cp -r /tmp/ezrtp-extract/. .github/ezrtp-baseline/
          rm -f .github/ezrtp-baseline/plugin.yml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/ezrtp-version.txt .github/ezrtp-baseline/
          git commit -m "chore: track EzRTP ${EZRTP_TAG} (no config changes)"
          git push
          echo "EzRTP ${EZRTP_TAG} is compatible — no release needed."

      # 5b. Config changed — open an issue for manual review
      - name: Open compatibility issue
        if: steps.version_check.outputs.skip == 'false' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EZRTP_TAG: ${{ steps.ezrtp.outputs.tag }}
        run: |
          diff_body=$(cat /tmp/config-diff.txt)
          body=$(cat <<EOF
          ## EzRTP ${EZRTP_TAG} released config changes

          The weekly compatibility check found differences in EzRTP's default config files compared to the last known baseline.

          **Review the diff below and update ConfigMapper.java as needed**, then:
          1. Update \`.github/ezrtp-version.txt\` with \`${EZRTP_TAG}\`
          2. Update \`.github/ezrtp-baseline/\` with the new config files
          3. Push and cut a new release

          \`\`\`diff
          ${diff_body}
          \`\`\`

          _Opened automatically by the EzRTP Compatibility Check workflow._
          EOF
          )
          gh issue create \
            --title "EzRTP ${EZRTP_TAG}: config changes need review" \
            --label "compatibility" \
            --body "$body"
          echo "::warning::EzRTP ${EZRTP_TAG} has config changes — issue opened for manual review."
