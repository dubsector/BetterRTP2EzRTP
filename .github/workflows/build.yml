name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B package --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: BetterRTP2EzRTP
          path: target/BetterRTP2EzRTP-*.jar
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MC_MIN=$(grep -oP '(?<=<minecraft.min.version>)[^<]+' pom.xml)
          MC_MAX=$(grep -A1 'paper-api' pom.xml | grep -oP '\d+\.\d+\.\d+' | head -1)
          EZRTP_VERSION=$(cat .github/ezrtp-version.txt | tr -d '[:space:]')

          NOTES=$(cat <<EOF
          ### Compatibility
          | Software | Version |
          |---|---|
          | Paper (and forks) | ${MC_MIN} – ${MC_MAX} |
          | EzRTP | ${EZRTP_VERSION} |

          ### Usage
          Drop the jar into your \`plugins/\` folder and run \`/migratertp\` to migrate your BetterRTP config to EzRTP.
          Use \`/migratertp --dry-run\` to preview the output without writing any files.
          EOF
          )

          gh release create "${TAG_NAME}" \
            target/BetterRTP2EzRTP-*.jar \
            --title "BetterRTP2EzRTP ${TAG_NAME}" \
            --notes "${NOTES}"
